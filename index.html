<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteo de Actividades</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Pantalla de inicio -->
    <section id="pantallaInicio">

        <div id="papelArrugado" title="Haz clic para abrir">
            📝
        </div>

        <button id="btnEmpezar" hidden>
            Empezar Sorteo
        </button>

    </section>

    <!-- Pantalla del sorteo -->
    <section id="pantallaSorteo" class="oculto">

        <h1>Sorteo de Actividades</h1>

        <p id="estado">
            Esperando...
        </p>

        <div id="contenedorPapeles">

            <!-- Los 20 papeles se crearán automáticamente desde script.js -->

        </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
